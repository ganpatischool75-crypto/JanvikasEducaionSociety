<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Links</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}

/* Card layout */
.card {
    background:#ffffff;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    width:300px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}

/* Logo styling */
.school-logo {
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:10px;
    border-radius:8px;
    background:#fff; /* helps visibility */
    border:1px solid #ddd;
}

/* Pioneer theme */
.pioneer-title {
    font-size:18px;
    margin-bottom:15px;
    color:#2e7d32;
    font-weight:bold;
}

/* Ganpati theme */
.ganpati-title {
    font-size:18px;
    margin-bottom:15px;
    color:#6f9e9c;
    font-weight:bold;
}

/* Janvikas theme */
.janvikas-card {
    background:#fff8e1;
    border-top:6px solid #d32f2f;
}

.janvikas-title {
    font-size:18px;
    margin-bottom:15px;
    color:#d32f2f;
    font-weight:bold;
}

/* Icons */
.icons img {
    width:40px;
    margin:10px;
    transition:0.3s;
}

.icons img:hover {
    transform:scale(1.15);
}
</style>

</head>

<body>

<!-- Pioneer School -->
<div class="card">
    <img src="images/Pioneer.jpeg" class="school-logo"
         onerror="this.src='https://via.placeholder.com/100?text=Pioneer'">

    <h2 class="pioneer-title">Pioneer International CBSE School</h2>

    <div class="icons">
        <a href="https://www.pioneerinternationalschool.co.in/">
            <img src="https://cdn-icons-png.flaticon.com/512/841/841364.png">
        </a>

        <a href="https://www.facebook.com/profile.php?id=100064291322283">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        </a>

        <a href="https://www.instagram.com/pioneerschool_jomalabhokardan">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
        </a>
    </div>
</div>

<!-- Ganpati School -->
<div class="card">
    <img src="images/Ganpati.jpeg" class="school-logo"
         onerror="this.src='https://via.placeholder.com/100?text=Ganpati'">

    <h2 class="ganpati-title">Shree Ganpati English & Marathi High School</h2>

    <div class="icons">
        <a href="https://ganpatischool.com/">
            <img src="https://cdn-icons-png.flaticon.com/512/841/841364.png">
        </a>

        <a href="https://www.facebook.com/profile.php?id=100057112523716">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        </a>

        <a href="https://www.instagram.com/ganpatischool_bhokardan">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
        </a>
    </div>
</div>

<!-- Janvikas -->
<div class="card janvikas-card">
    <img src="images/Janvikas.png" class="school-logo"
         onerror="this.src='https://via.placeholder.com/100?text=Janvikas'">

    <h2 class="janvikas-title">
        Janvikas Education Society, Bhokardan
    </h2>

    <div class="icons">
        <a href="https://www.linkedin.com/company/94177325/admin/dashboard/">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">
        </a>
    </div>
</div>

</body>
</html>
